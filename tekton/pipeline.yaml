apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: cd-pipeline
spec:
  workspaces:
    - name: pipeline-workspace
  params:
    - name: repo-url
      type: string
    - name: branch
      type: string
      default: "main"
    - name: build-image
      type: string
      description: "Full image name for the built container"
  tasks:
    - name: clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.branch)
      workspaces:
        - name: output
          workspace: pipeline-workspace

    - name: lint
      taskRef:
        name: flake8-lint
      params:
        - name: args
          value: ["--count","--max-complexity=10","--max-line-length=127","--statistics"]
      workspaces:
        - name: output
          workspace: pipeline-workspace
      runAfter:
        - clone

    - name: tests
      taskRef:
        name: nose
      params:
        - name: database_uri
          value: "sqlite:///test.db"
        - name: args
          value: "-v --with-spec --spec-color"
      workspaces:
        - name: source
          workspace: pipeline-workspace
      runAfter:
        - clone

    - name: build
      taskRef:
        name: buildah
        kind: ClusterTask
      params:
        - name: IMAGE
          value: $(params.build-image)
      workspaces:
        - name: source
          workspace: pipeline-workspace
      runAfter:
        - tests
        - lint

    - name: deploy
      taskRef:
        name: openshift-client
        kind: ClusterTask
      params:
        - name: SCRIPT
          value: |
            echo "Updating manifest with image: $(params.build-image)"
            sed -i "s|IMAGE_NAME_HERE|$(params.build-image)|g" deploy/deployment.yaml
            echo "Deployment YAML after substitution:"
            cat deploy/deployment.yaml
            echo "Applying manifests to OpenShift..."
            oc apply -f deploy/
            echo "Checking pods:"
            oc get pods -l app=accounts
      workspaces:
        - name: source
          workspace: pipeline-workspace
      runAfter:
        - build