apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: cd-pipeline
spec:
  workspaces:
    - name: pipeline-workspace
  params:
    - name: repo-url
      type: string
    - name: branch
      type: string
      default: "main"
    - name: build-image          # 👈 new parameter
      type: string
      description: "Full image name (registry/namespace/repo:tag)"
      default: "us.icr.io/sn-labs-vanshagarwa2/accounts:latest"   # adjust as needed
  tasks:
    - name: clone
      taskRef:
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.branch)
      workspaces:
        - name: output
          workspace: pipeline-workspace

    - name: lint
      taskRef:
        name: flake8-lint
      params:
        - name: args
          value: ["--count","--max-complexity=10","--max-line-length=127","--statistics"]
      workspaces:
        - name: output
          workspace: pipeline-workspace
      runAfter:
        - clone

    - name: tests
      taskRef:
        name: nose
      params:
        - name: database_uri
          value: "sqlite:///test.db"
        - name: args
          value: "-v --with-spec --spec-color"
      workspaces:
        - name: source          # the nose task expects 'source'
          workspace: pipeline-workspace
      runAfter:
        - clone

    - name: build               # 👈 new task
      taskRef:
        name: buildah
        kind: ClusterTask       # assuming you have buildah ClusterTask installed
      params:
        - name: IMAGE
          value: $(params.build-image)
      workspaces:
        - name: source          # buildah expects a workspace named 'source' (or 'output' depends on version)
          workspace: pipeline-workspace
      runAfter:
        - tests
        - lint